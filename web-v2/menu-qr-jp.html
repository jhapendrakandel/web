<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ナマステ メニュー</title>
<link rel="icon" href="img/logo.png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<!-- paste the exact same <style> block from menu-qr.html here -->
<link rel="stylesheet" href="css/index.css"/>
<style>
/* paste same style block from menu-qr.html */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@300;400;700&family=Noto+Sans+JP:wght@400;700&display=swap');
:root{--red:#8B1A1A;--gold:#C9A84C;--cream:#FDF6EC;--text:#2C2C2C;--mid:#5A5A5A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Lato',sans-serif;background:var(--cream);color:var(--text)}
.qr-header{background:var(--red);padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100}
.qr-header img{height:36px;width:auto;filter:brightness(2)}
.qr-header p{color:rgba(255,255,255,.7);font-size:.68rem;letter-spacing:.1em;margin-top:4px}
.lang-bar{background:#111;display:flex;justify-content:center;padding:8px;gap:8px}
.lang-bar a{color:rgba(255,255,255,.5);font-size:.72rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:5px 14px;border:1px solid rgba(255,255,255,.15);
  border-radius:20px;text-decoration:none;transition:.2s}
.lang-bar a.active{color:var(--gold);border-color:var(--gold)}
.hours-strip{background:#1a1a1a;color:rgba(255,255,255,.7);font-size:.72rem;text-align:center;padding:7px;letter-spacing:.04em}
.hours-strip strong{color:var(--gold)}
.cat-tabs{display:flex;overflow-x:auto;gap:8px;padding:14px 12px;background:#fff;
  border-bottom:1px solid rgba(0,0,0,.06);scrollbar-width:none;position:sticky;top:64px;z-index:99}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:8px 16px;border:1.5px solid rgba(0,0,0,.1);border-radius:20px;
  font-size:.78rem;font-weight:700;background:#fff;color:var(--mid);cursor:pointer;transition:.2s}
.cat-tab.active{background:var(--red);border-color:var(--red);color:#fff}
.menu-list{padding:12px;display:flex;flex-direction:column;gap:12px;max-width:600px;margin:0 auto}
.menu-qr-card{background:#fff;border-radius:12px;overflow:hidden;display:grid;grid-template-columns:100px 1fr;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.menu-qr-card-img{width:100px;height:100px;object-fit:cover;display:block}
.menu-qr-card-body{padding:12px 12px 12px 10px;display:flex;flex-direction:column;gap:5px}
.menu-qr-card-body h3{font-family:'Playfair Display',serif;font-size:.92rem;color:var(--text);line-height:1.25}
.menu-qr-card-body p{font-size:.72rem;color:var(--mid);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.menu-qr-price{font-size:1rem;font-weight:700;color:var(--red);margin-top:auto}
.menu-qr-badge{display:inline-block;font-size:.6rem;font-weight:700;background:var(--gold);color:#000;border-radius:10px;padding:2px 7px;align-self:flex-start}
.drink-qr-card{background:#fff;border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.drink-qr-card h4{font-size:.88rem;color:var(--text);flex:1;line-height:1.3}
.drink-qr-card p{font-size:.72rem;color:var(--mid)}
.drink-qr-card .dq-price{font-size:.95rem;font-weight:700;color:var(--red);white-space:nowrap}
.drink-subfilter{display:flex;overflow-x:auto;gap:6px;padding:0 12px 10px;scrollbar-width:none}
.drink-subfilter::-webkit-scrollbar{display:none}
.dsf-btn{flex-shrink:0;padding:6px 13px;border:1px solid rgba(0,0,0,.12);border-radius:16px;font-size:.72rem;font-weight:700;background:#fff;color:var(--mid);cursor:pointer;transition:.2s}
.dsf-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.qr-footer{text-align:center;padding:30px 16px 40px;color:var(--mid);font-size:.75rem;line-height:1.8}
.qr-footer strong{color:var(--text)}
.qr-footer a{color:var(--red);text-decoration:none;font-weight:700}
</style>
</head>
<body>

<div class="qr-header">
  <img src="img/logo.png" alt="ナマステ"/>
  <p>インド・ネパール料理レストラン · 広島</p>
</div>

<div class="lang-bar">
  <a href="menu-qr.html">English</a>
  <a href="menu-qr-jp.html" class="active">日本語</a>
</div>

<div class="hours-strip">
  <strong>ランチ</strong> 11:00–15:00 (L.O. 14:30) &nbsp;|&nbsp;
  <strong>ディナー</strong> 17:00–22:00 (L.O. 21:30)
</div>

<div class="cat-tabs">
  <button class="cat-tab active" onclick="qrShow('lunch',this)">☀️ ランチ</button>
  <button class="cat-tab" onclick="qrShow('curry',this)">🔥 カレー</button>
  <button class="cat-tab" onclick="qrShow('ala-carte',this)">⭐ アラカルト</button>
  <button class="cat-tab" onclick="qrShow('special',this)">👑 スペシャル</button>
  <button class="cat-tab" onclick="qrShow('dessert',this)">🍨 デザート</button>
  <button class="cat-tab" onclick="qrShow('drinks',this)">🥂 ドリンク</button>
</div>

<div class="menu-list" id="menuList"></div>

<footer class="qr-footer">
  <strong>ナマステインドレストラン</strong><br/>
  段原店 <a href="tel:0822620004">082-262-0004</a> &nbsp;·&nbsp;
  八丁堀店 <a href="tel:0822223240">082-222-3240</a> &nbsp;·&nbsp;
  大手町店 <a href="tel:0822363339">082-236-3339</a><br/><br/>
  <a href="index.html">← ウェブサイトへ</a>
</footer>

<script src="js/jp.index.js"></script>
<script>
var currentDrinkFilter = 'all';

function qrShow(cat, btn) {
  document.querySelectorAll('.cat-tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var list = document.getElementById('menuList');
  list.innerHTML = '';

  if (cat === 'drinks') {
    var cats = ['all','beer','whiskey','cocktail','wine','plum','soft'];
    var labels = {all:'すべて',beer:'🍺 ビール',whiskey:'🥃 ウィスキー',
                  cocktail:'🍹 カクテル',wine:'🍷 ワイン',plum:'梅酒',soft:'🥤 ソフト'};
    var sf = document.createElement('div');
    sf.className = 'drink-subfilter';
    cats.forEach(function(c){
      var b = document.createElement('button');
      b.className = 'dsf-btn' + (c === currentDrinkFilter ? ' active' : '');
      b.textContent = labels[c];
      b.onclick = function(){
        currentDrinkFilter = c;
        document.querySelectorAll('.dsf-btn').forEach(function(x){ x.classList.remove('active'); });
        b.classList.add('active');
        renderQrDrinks(c);
      };
      sf.appendChild(b);
    });
    list.appendChild(sf);
    renderQrDrinks(currentDrinkFilter);
    return;
  }

  currentDrinkFilter = 'all';
  var items = menuData[cat] || [];
  items.forEach(function(item){
    var card = document.createElement('div');
    card.className = 'menu-qr-card';
    card.innerHTML =
      '<img class="menu-qr-card-img" src="'+item.image+'" alt="'+item.name+'" loading="lazy" '+
        'onerror="this.style.background=\'#f5ecd8\'">' +
      '<div class="menu-qr-card-body">'+
        (item.badge ? '<span class="menu-qr-badge">'+item.badge+'</span>' : '')+
        '<h3>'+item.name+'</h3>'+
        '<p>'+item.description.replace(/<[^>]+>/g,' ')+'</p>'+
        '<div class="menu-qr-price">'+item.price+'</div>'+
      '</div>';
    list.appendChild(card);
  });
}

function renderQrDrinks(cat) {
  var list = document.getElementById('menuList');
  list.querySelectorAll('.drink-qr-card').forEach(function(el){ el.remove(); });
  var filtered = cat === 'all' ? drinksData : drinksData.filter(function(d){ return d.category === cat; });
  filtered.forEach(function(d){
    var card = document.createElement('div');
    card.className = 'drink-qr-card';
    card.innerHTML = '<div><h4>'+d.name+'</h4><p>'+d.description+'</p></div><div class="dq-price">'+d.price+'</div>';
    list.appendChild(card);
  });
}

qrShow('lunch', document.querySelector('.cat-tab'));
</script>
</body>
</html>
